# ═══════════════════════════════════════════════════
# PlantGuard AI — Configuration
# Production-grade Plant Disease Detection System
# ═══════════════════════════════════════════════════

project:
  name: "PlantGuard AI"
  version: "2.0.0"
  description: "Production-grade plant disease detection using deep learning"
  use_case: "plant_disease"

dataset:
  name: "CIFAR-10"
  num_classes: 10
  image_size: 32
  upscale_size: 224
  class_names:
    - airplane
    - automobile
    - bird
    - cat
    - deer
    - dog
    - frog
    - horse
    - ship
    - truck
  val_split: 0.1

augmentation:
  horizontal_flip: true
  rotation_range: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.05
  random_erasing: 0.1

models:
  custom_cnn:
    filters: [64, 128, 256, 512]
    dropout: 0.4
    num_classes: 10
  efficientnet:
    backbone: "efficientnet_b0"
    pretrained: true
    freeze_backbone: true
    fine_tune_layers: 20
    dropout: 0.3
    num_classes: 10

training:
  batch_size: 64
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler:
    type: "cosine"
    T_max: 30
    eta_min: 0.00001
  early_stopping:
    patience: 8
    min_delta: 0.001

paths:
  custom_model: "models/saved/custom_cnn.pt"
  efficientnet_model: "models/saved/efficientnet.pt"
  comparison: "models/saved/comparison.pkl"
  data_dir: "data"

api:
  host: "0.0.0.0"
  port: 8000
  max_file_size_mb: 10

inference:
  confidence_threshold: 0.5
  top_k: 5
  device: "auto"
